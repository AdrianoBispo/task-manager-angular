<div class="min-h-screen bg-slate-50 px-4 py-10">
  <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
    <section class="w-full rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
      <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Criar Conta</h1>
        <p class="mt-2 text-sm text-slate-600">Comece a organizar suas tarefas em poucos passos.</p>
      </header>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" novalidate>
        <div>
          <label for="nome" class="mb-1 block text-sm font-medium text-slate-700">Nome</label>
          <input
            id="nome"
            type="text"
            formControlName="nome"
            placeholder="Seu nome"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
          />
          <p *ngIf="form.controls.nome.invalid && form.controls.nome.touched" class="mt-1 text-xs text-red-600">
            O nome deve ter no minimo 3 caracteres.
          </p>
        </div>

        <div>
          <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="voce@email.com"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
          />
          <p *ngIf="form.controls.email.invalid && form.controls.email.touched" class="mt-1 text-xs text-red-600">
            Informe um email valido.
          </p>
        </div>

        <div>
          <label for="senha" class="mb-1 block text-sm font-medium text-slate-700">Senha</label>
          <input
            id="senha"
            type="password"
            formControlName="senha"
            placeholder="Minimo 6 caracteres"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
          />
          <p *ngIf="form.controls.senha.invalid && form.controls.senha.touched" class="mt-1 text-xs text-red-600">
            A senha deve ter no minimo 6 caracteres.
          </p>
        </div>

        <p *ngIf="errorMessage" class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
          {{ errorMessage }}
        </p>

        <button
          type="submit"
          [disabled]="form.invalid || isSubmitting"
          class="inline-flex w-full items-center justify-center rounded-lg bg-sky-600 px-4 py-2 font-medium text-white transition hover:bg-sky-700 disabled:cursor-not-allowed disabled:bg-slate-400"
        >
          {{ isSubmitting ? 'Criando...' : 'Criar conta' }}
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-600">
        Ja tem conta?
        <a routerLink="/auth/login" class="font-medium text-sky-700 hover:underline">Entrar</a>
      </p>
    </section>
  </div>
</div>
